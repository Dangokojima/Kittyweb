<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?
family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&
family=UnifrakturCook:wght@700&
family=Inika:wght@400;700&
display=swap" rel="stylesheet">
<title>Kitty</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #1a1625;
  --text: #ffffff;
  --accent: #a855f7;
}

body.light {
  --bg: #ffffff;
  --text: #1a1625;
}

body {
  padding-top: 300px;
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

/* FONTS */
.font-title {
  font-family: 'UnifrakturCook', cursive;
}

.font-serif {
  font-family: 'Inika', serif;
}

.font-buttons {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}

/* HERO */
.hero {
  position: fixed;
  inset: 0 auto auto 0;
  width: 100%;
  height: 600px;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0), var(--bg)),
    url("https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/BG/BGTop.png") center/cover no-repeat;
  z-index: -1;
}

.hero-content {
  position: absolute;
  top: 350px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  max-width: 800px;
  padding: 0 20px;
}

.hero-content h1 {
  font-size: clamp(28px, 5vw, 48px);
  margin-bottom: 16px;

  color: #EED6C9;

  text-shadow:
    0 2px 6px rgba(0,0,0,0.8),
    0 0 12px rgba(238,214,201,0.25);
}

.hero-content p {
  font-size: clamp(14px, 2vw, 18px);
  line-height: 1.6;
  margin-bottom: 24px;

  color: #EED6C9;
  opacity: 0.95;
}

/* HEADER */
.kitty-header {
  position: fixed;
  inset: 0 0 auto 0;
  padding: 15px clamp(16px, 4vw, 20px);
  display: flex;
  align-items: center;
  gap: 20px;
  background: linear-gradient(to bottom, rgba(26,22,37,.95), rgba(26,22,37,0));
  z-index: 1000;
  color: #fff;
}

.header-left { position: relative; width: 80px; height: 40px; }

.logo-img {
  position: absolute;
  top: 150%;
  left: 0;
  transform: translateY(-50%);
  height: 128px;
}

/* MENU */
.header-center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.header-center img {
  display: block;
}

.header-center a {
  display: flex;
  align-items: center;
  text-decoration: none;
  color: #fff;
}

/* HOVER BORDER */
.header-center a span {
  position: relative;
  padding: 4px 8px;
}

.header-center a span::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px solid #FFBA4B;
  border-radius: 25px;

  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

/* BASE */
.header-center a span {
  position: relative;
  padding: 4px 8px;
}

.header-center a span::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px solid #FFBA4B;
  border-radius: 25px;

  opacity: 0;
  transform: scale(0.95);

  /* 👇 já prepara o glow */
  box-shadow:
    0 0 0 rgba(255, 186, 75, 0),
    0 0 0 rgba(255, 186, 75, 0);

  transition:
    opacity 0.25s ease,
    transform 0.25s ease,
    box-shadow 0.4s ease; /* 👈 bloom suave */
}

/* HOVER */
.header-center a:hover span::after {
  opacity: 1;
  transform: scale(1);

  /* 👇 bloom entra suave e fica */
  box-shadow:
    0 0 6px rgba(255, 186, 75, 0.6),
    0 0 14px rgba(255, 186, 75, 0.4),
    0 0 24px rgba(255, 186, 75, 0.25);

  /* 👇 só o pulse */
  animation: pulseBorder 2s ease-in-out infinite;
}

/* PULSE (sem mexer no glow) */
@keyframes pulseBorder {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.02);
  }
  100% {
    transform: scale(1);
  }
}

/* DOTS */
.header-center a:not(:last-child)::after {
  content: "・";
  color: var(--accent);
  font-size: 14px;
  color: #fff;
}

/* RIGHT */
.header-right {
  display: flex;
  gap: 8px;
  margin-left: auto;
  align-items: center;
}

.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #fff;
}

/* CTA */
.cta {
  position: relative;
  overflow: hidden;

  background: linear-gradient(135deg, #A236D3, #541C6D);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 25px;

  cursor: pointer;
  transition: 0.3s ease;
}

/* TEXTO NA FRENTE */
.cta span {
  position: relative;
  z-index: 2;
}

/* HOLO EFFECT */
.cta::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;

  background: linear-gradient(
    0deg,
    transparent,
    transparent 30%,
    rgba(255,255,255,0.25)
  );

  transform: rotate(-45deg);
  opacity: 0;
  transition: 0.5s ease;
}

/* HOVER */
.cta:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.6);
}

.cta:hover::before {
  opacity: 1;
  transform: rotate(-45deg) translateY(100%);
}

/* ICON BUTTON */
.icon-btn {
  display: flex;
  align-items: center;
  border: none;
  background: none;
  cursor: pointer;
}

.icon-btn img { height: 18px; }

/* MENU BTN */
.menu-btn {
  display: none;
  width: 32px;
  height: 32px;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(129, 66, 208, 0.9);
  opacity: 0;
  pointer-events: none;
  transition: .3s;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

/* SIDE PANEL */
.side-panel {
  position: fixed;
  inset: 0;
  background: rgba(129, 66, 208, 0.95);

  display: flex;
  flex-direction: column;
  align-items: flex-end;

  padding: 80px 40px;
  gap: 30px;

  transform: translateX(100%);
  transition: 0.4s ease;
  z-index: 99999;
}

.side-panel.open {
  transform: translateX(0);
}

.close-btn {
  position: absolute;
  top: 20px;
  left: 20px;

  cursor: pointer;
}

.close-btn img {
  height: 22px;

  transition:
    transform 0.25s ease,
    filter 0.25s ease;
}

/* HOVER */
.close-btn:hover img {
  transform: scale(1.15);

  filter:
    drop-shadow(0 0 6px rgba(255, 186, 75, 0.7))
    drop-shadow(0 0 12px rgba(255, 186, 75, 0.4))
    brightness(1.2);
}

/* LOGO */
.side-logo {
  height: 200px;
  margin-right: -90px;
  object-fit: contain;
}

/* MENU */
.side-menu {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 20px;
}

/* LINKS SIDEPANEL */
.side-menu a {
  color: #fff;
  font-size: 1.5rem;
  text-decoration: none;

  transition: 
    transform 0.25s ease,
    color 0.25s ease,
    text-shadow 0.25s ease;
}

/* HOVER */
.side-menu a:hover {
  color: #FFBA4B;

  transform: scale(1.05);

  /* ✨ BLOOM */
  text-shadow:
    0 0 6px rgba(255, 186, 75, 0.7),
    0 0 12px rgba(255, 186, 75, 0.5),
    0 0 20px rgba(255, 186, 75, 0.3);
}

/* BOTÃO */
.mobile-cta {
  margin-top: 10px;
  border: 1px solid #fff;
  background: none;
  color: #fff;
  padding: 10px 20px;
  border-radius: 25px;

  transition:
    transform 0.25s ease,
    color 0.25s ease,
    border-color 0.25s ease,
    box-shadow 0.25s ease;
}

/* HOVER */
.mobile-cta:hover {
  color: #FFBA4B;
  border-color: #FFBA4B;

  transform: scale(1.05);

  box-shadow:
    0 0 8px rgba(255, 186, 75, 0.6),
    0 0 16px rgba(255, 186, 75, 0.4);
}

/* SOCIAL */
.socials {
  display: flex;
  gap: 16px;
  justify-content: flex-end;
}

.socials img {
  height: 22px;

  transition:
    transform 0.25s ease,
    filter 0.25s ease;
}

/* HOVER */
.socials a:hover img {
  transform: scale(1.15);

  /* ✨ glow + cor */
  filter:
    drop-shadow(0 0 6px rgba(255, 186, 75, 0.7))
    drop-shadow(0 0 12px rgba(255, 186, 75, 0.4))
    brightness(1.2);
}

/* =========================
   PORTFOLIO
========================= */

.portfolio-section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.portfolio-header {
  text-align: center;
  margin-bottom: 40px;
}

.portfolio-header h2 {
  font-size: 14px;
  opacity: 0.7;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.portfolio-header h3 {
  font-size: clamp(28px, 4vw, 40px);
}

/* GRID */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  width: 100%;
  aspect-ratio: 340 / 520;
  overflow: hidden;
  border-radius: 12px;

  border: 1px solid rgba(168,85,247,0.4);

  position: relative;
}

/* IMAGEM */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card:hover {
  transform: scale(1.02);
  box-shadow: 0 0 20px rgba(168,85,247,0.4);
  transition: 0.3s;
}

/* CONTROLE DE POSIÇÃO */
.pos-center { object-position: center; }
.pos-left   { object-position: left; }
.pos-right  { object-position: right; }

/* MOBILE */
@media (max-width:768px) {
  .portfolio-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  /* esconde as duas últimas */
  .portfolio-grid .card:nth-child(n+5) {
    display: none;
  }
}

/* MOBILE */
@media (max-width:768px) {
  .header-center { display:none; }
  #openPopup { display:none; }
  .menu-btn { display:flex; }
}

.scroll-indicator {
  margin-top: 20px;
  display: flex;
  justify-content: center;
}

.arrow {
  width: 16px;
  height: 16px;
  border-right: 2px solid #EED6C9;
  border-bottom: 2px solid #EED6C9;
  transform: rotate(45deg);
  opacity: 0.8;

  animation: arrowBounce 1.5s infinite;
}

@keyframes arrowBounce {
  0% {
    transform: rotate(45deg) translateY(0);
    opacity: 0.6;
  }
  50% {
    transform: translateY(6px) rotate(45deg);
    opacity: 1;
  }
  100% {
    transform: rotate(45deg) translateY(0);
    opacity: 0.6;
  }
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup.show { display:flex; }

.popup-content {
  background:var(--bg);
  padding:30px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="hero"></div>

<section class="hero-content">
  <h1 class="font-title" data-i18n="hero_title"></h1>

  <p class="font-serif" data-i18n="hero_desc"></p>

  <button class="cta font-serif" data-i18n="hero_cta"></button>
  <div class="scroll-indicator">
    <span class="arrow"></span>
  </div>
</section>

<section class="portfolio-section">

  <div class="portfolio-header">
    <h2 class="font-serif" data-i18n="portfolio_label"></h2>
    <h3 class="font-title" data-i18n="portfolio_title"></h3>
  </div>

  <div class="portfolio-grid">

    <div class="card"><img src="gallery/1.png" class="pos-center"></div>
    <div class="card"><img src="gallery/2.png" class="pos-left"></div>
    <div class="card"><img src="gallery/3.png" class="pos-right"></div>

    <div class="card"><img src="gallery/4.png" class="pos-center"></div>
    <div class="card"><img src="gallery/5.png" class="pos-left"></div>
    <div class="card"><img src="gallery/6.png" class="pos-right"></div>

  </div>

</section>

<header class="kitty-header">
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/Logo.png" class="logo-img">
  </div>

  <nav class="header-center">
    <a href="#about">
      <span class="font-buttons" data-i18n="about">Sobre</span>
    </a>

    <a href="#portfolio">
      <span class="font-buttons" data-i18n="portfolio">Trabalhos</span>
    </a>

    <a href="#contact">
      <span class="font-buttons" data-i18n="contact">Contato</span>
    </a>

    <a href="#faq">
      <span class="font-buttons" data-i18n="faq">FAQ</span>
    </a>

    <!-- VGEN -->
    <a href="https://vgen.co/Kittyhikari" target="_blank">
      <span>
        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/Vgenfulllogo.svg" style="height:15px;">
      </span>
    </a>
  </nav>

  <div class="header-right">
    <button id="openPopup" class="cta font-serif" data-i18n="cta"></button>

    <button id="themeToggle" class="icon-btn">
      <img id="themeIcon">
    </button>

    <button id="langToggle" class="icon-btn lang-btn font-buttons">
      <img id="langIcon">
      <span id="langText">BR</span>
    </button>

    <button id="menuBtn" class="menu-btn icon-btn">
      <img id="menuIcon">
    </button>
  </div>
</header>

<div id="overlay" class="overlay"></div>

<div id="sidePanel" class="side-panel">

  <button id="closeBtn" class="close-btn icon-btn">
    <img id="closeIcon">
  </button>

  <img id="logoWhite" class="side-logo">

  <div class="side-menu">
    <a href="#about" class="font-buttons" data-i18n="about">Sobre</a>
    <a href="#portfolio" class="font-buttons" data-i18n="portfolio">Trabalhos</a>
    <a href="#contact" class="font-buttons" data-i18n="contact">Contato</a>
    <a href="#faq" class="font-buttons" data-i18n="faq">FAQ</a>

    <button id="mobilePopup" class="mobile-cta font-serif" data-i18n="cta"></button>

    <div class="socials">
      <a href="https://bsky.app/profile/kittyhikari.bsky.social" target="_blank">
        <img data-social="Blue">
      </a>

      <a href="https://www.instagram.com/kitty_hikari/" target="_blank">
        <img data-social="Insta">
      </a>

      <a href="https://www.tiktok.com/@kittyhikari_art" target="_blank">
        <img data-social="Tiktok">
      </a>

      <a href="https://vgen.co/Kittyhikari" target="_blank">
        <img data-social="Vgen">
      </a>

      <a href="https://x.com/KittyHikari_art?t=WbxfJxjSQgHHvNHExcrHlw&s=09" target="_blank">
        <img data-social="X">
      </a>
    </div>
  </div>

</div>

<div id="popup" class="popup">
  <div class="popup-content">
    <p id="popupText">...</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const BASE = "https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main";

const themeIcon = document.getElementById("themeIcon");
const langText = document.getElementById("langText");
const langIcon = document.getElementById("langIcon");
langIcon.src = `${BASE}/images/lang.svg`;
const menuIcon = document.getElementById("menuIcon");

const menuBtn = document.getElementById("menuBtn");
const sidePanel = document.getElementById("sidePanel");
const overlay = document.getElementById("overlay");

const openPopup = document.getElementById("openPopup");
const mobilePopup = document.getElementById("mobilePopup");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const closeIcon = document.getElementById("closeIcon");
closeIcon.src = `${BASE}/images/close.svg`;
menuIcon.src = `${BASE}/images/menu.svg`;
document.getElementById("logoWhite").src = `${BASE}/images/Logowhite.png`;
document.getElementById("closeBtn").onclick = closeMenu;

/* SOCIAL ICONS */
document.querySelectorAll("[data-social]").forEach(el=>{
  el.src = `${BASE}/images/${el.dataset.social}.svg`;
});

/* LANG */
let currentLang = localStorage.getItem("lang") || (navigator.language.includes("pt") ? "pt":"en");

let translations = {};

function loadTranslations(lang){
  fetch(`${BASE}/data/${lang}.json?v=${Date.now()}`)
    .then(r=>r.json())
    .then(data=>{
      translations = data;
      applyTranslations();
    });
}

function applyTranslations(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    const value = translations[key];

    el.innerHTML = (value || el.textContent || "")
      .replace(/\n/g, "<br>");
  });

  langText.textContent = currentLang==="pt"?"BR":"EN";
}

loadTranslations(currentLang);

document.getElementById("langToggle").onclick=()=>{
  currentLang = currentLang==="pt"?"en":"pt";
  localStorage.setItem("lang",currentLang);
  loadTranslations(currentLang);
};

/* THEME */
function updateTheme(){
  const light = document.body.classList.contains("light");
  themeIcon.src = light ? `${BASE}/images/light.svg` : `${BASE}/images/dark.svg`;
}
updateTheme();

document.getElementById("themeToggle").onclick=()=>{
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light")?"light":"dark");
  updateTheme();
};

/* MENU */
menuBtn.onclick=()=>{
  sidePanel.classList.toggle("open");
  overlay.classList.toggle("show");
};

overlay.onclick=()=>{
  sidePanel.classList.remove("open");
  overlay.classList.remove("show");
};

function closeMenu(){
  sidePanel.classList.remove("open");
  overlay.classList.remove("show");
}

/* POPUP */
const links={
  pt:"https://tally.so/r/gD0Qq1",
  en:"https://tally.so/r/wb5pJ6"
};

function openForm(){
  popup.classList.add("show");
  popupText.textContent = translations.popup || "...";
  setTimeout(()=>{
    window.open(links[currentLang],"_blank");
    popup.classList.remove("show");
  },600);
}

openPopup.onclick=openForm;

/* ===== CLOSE EM TUDO ===== */

// links (Sobre, Trabalhos, etc)
document.querySelectorAll(".side-menu a").forEach(el=>{
  el.addEventListener("click", closeMenu);
});

// redes sociais
document.querySelectorAll(".socials img").forEach(el=>{
  el.addEventListener("click", closeMenu);
});

// botão comissão mobile (fecha antes de abrir)
mobilePopup.onclick = () => {
  closeMenu();
  openForm();
};

sidePanel.addEventListener("click", (e) => {
  if (e.target === sidePanel) {
    closeMenu();
  }
});

});
</script>

</body>
</html>
