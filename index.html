<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=UnifrakturCook:wght@700&family=Inika:wght@400;700&display=swap" rel="stylesheet">
    <!-- CDN (desativado)
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Dangokojima/Kittysiteimages@main/data/codevisual6.css">
    <script defer src="https://cdn.jsdelivr.net/gh/Dangokojima/Kittysiteimages@main/data/codescript6.js"></script>-->
    
    <!-- LOCAL -->
    <link rel="stylesheet" href="./data/codevisual6.css">
    <script defer src="./data/codescript6.js"></script>
    <title>Kitty</title>
</head>

<body>

  <header class="kitty-header">
    <div class="header-left">
      <a href="#">
        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/Logo.png" class="logo-img">
      </a>
    </div>

    <nav class="header-center">
      <a href="#portfolio">
        <span class="font-buttons" data-i18n="portfolio">Portfólio</span>
      </a>

      <a href="#" data-page="projects">
        <span class="font-buttons" data-i18n="projects">Projetos</span>
      </a>

      <a href="#" data-page="pricing">
        <span class="font-buttons" data-i18n="pricing">Preços</span>
      </a>

      <a href="#faq">
        <span class="font-buttons" data-i18n="faq">FAQ</span>
      </a>

      <a href="#" data-open="terms">
        <span class="font-buttons" data-i18n="tos"></span>
      </a>

      <a href="#footer">
        <span class="font-buttons" data-i18n="contact">Contato</span>
      </a>

      <a href="https://vgen.co/Kittyhikari" target="_blank">
        <span>
          <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/Vgenfulllogo.svg" style="height:15px;">
        </span>
      </a>
    </nav>

    <div class="header-right">
      <button id="openTally" class="cta font-serif" data-i18n="cta"></button>
      <button id="themeToggle" class="icon-btn"><img id="themeIcon"></button>
      <button id="langToggle" class="icon-btn lang-btn font-buttons">
        <img id="langIcon"><span id="langText">BR</span>
      </button>
      <button id="menuBtn" class="menu-btn icon-btn"><img id="menuIcon"></button>
    </div>
  </header>

  <main id="homepage-content">
    
    <section class="hero">
      <div class="hero-content">
        <h1 class="font-title" data-i18n="hero_title"></h1>
        <p class="font-serif" data-i18n="hero_desc"></p>
        <button class="cta font-serif" data-i18n="hero_cta"></button>
        <div class="scroll-indicator"><span class="arrow"></span></div>
      </div>
    </section>

    <section class="portfolio-section" id="portfolio">
      <div class="portfolio-header">
        <h2 class="font-serif" data-i18n="portfolio_label"></h2>
        <h3 class="font-title" data-i18n="portfolio_title"></h3>
      </div>
      <div class="portfolio-grid">
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/1.png" class="pos-center"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/2.png" class="pos-left"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/3.png" class="pos-right"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/4.png" class="pos-center"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/5.png" class="pos-left"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/gallery/6.png" class="pos-right"></div>
      </div>

      <div style="text-align:center; margin-top:40px;">
        <button class="cta" id="openPortfolio">
          Ver mais
        </button>
      </div>
    </section>

    <section class="services-section">
      <div class="services-header">
        <h2 class="font-serif" data-i18n="services_label"></h2>
        <h3 class="font-title" data-i18n="services_title"></h3>
      </div>
      <div class="services-wrapper">
        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/arrow.svg" class="arrow-side left">
        <div class="services-grid">
          <div class="service-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/service_1.svg" class="service-icon">
            <h4 data-i18n="service_label1"></h4>
            <p data-i18n="service_desc1"></p>
          </div>
          <div class="service-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/service_2.svg" class="service-icon">
            <h4 data-i18n="service_label2"></h4>
            <p data-i18n="service_desc2"></p>
          </div>
          <div class="service-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/service_3.svg" class="service-icon">
            <h4 data-i18n="service_label3"></h4>
            <p data-i18n="service_desc3"></p>
          </div>
          <div class="service-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/service_4.svg" class="service-icon">
            <h4 data-i18n="service_label4"></h4>
            <p data-i18n="service_desc4"></p>
          </div>
        </div>
        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/arrow.svg" class="arrow-side right">
      </div>
    </section>

    <section class="reviews-section">
      <div class="reviews-header">
        <h2 class="font-serif" data-i18n="reviews_label"></h2>
        <h3 class="font-title" data-i18n="reviews_title"></h3>
      </div>

      <div class="reviews-wrapper">

        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/arrow.svg" class="arrow-side left">

        <div class="reviews-grid">

          <div class="review-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/quote.svg" class="quote-icon">
            <h4 data-i18n="review_name1"></h4>
            <p data-i18n="review_text1"></p>
          </div>

          <div class="review-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/quote.svg" class="quote-icon">
            <h4 data-i18n="review_name2"></h4>
            <p data-i18n="review_text2"></p>
          </div>

          <div class="review-card">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/quote.svg" class="quote-icon">
            <h4 data-i18n="review_name3"></h4>
            <p data-i18n="review_text3"></p>
          </div>

        </div>

        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/arrow.svg" class="arrow-side right">

      </div>
    </section>

    <section class="faq-section" id="faq">
        <div class="faq-container">
          
          <div class="faq-image">
            <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/faq.png">
          </div>

          <div class="faq-content">
            <h2 class="font-serif" data-i18n="faq_header"></h2>

            <div class="faq-list">
              <div class="faq-item active">
                <div class="faq-question" data-index="1">
                  <span data-i18n="faq_title1"></span>
                  <span class="faq-icon">×</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc1"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="2">
                  <span data-i18n="faq_title2"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc2"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="3">
                  <span data-i18n="faq_title3"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc3"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="4">
                  <span data-i18n="faq_title4"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc4"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="5">
                  <span data-i18n="faq_title5"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc5"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="6">
                  <span data-i18n="faq_title6"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc6"></div>
              </div>

              <div class="faq-item">
                <div class="faq-question" data-index="7">
                  <span data-i18n="faq_title7"></span>
                  <span class="faq-icon">+</span>
                </div>
                <div class="faq-answer" data-i18n="faq_desc7"></div>
              </div>

            </div>
          </div>

        </div>
      </section>

  </main>

  <section id="termsPage" class="terms-page">
    <div class="terms-container">
      <h1 class="font-title">Termos de Serviço</h1>
      <p class="font-serif">Carregando...</p>
      <button id="closeTerms" class="cta">Voltar</button>
    </div>
  </section>

  <div id="tallyPage" class="terms-page">

    <div class="terms-container" style="max-width: 1000px; width: 100%;">

      <!-- PT -->
      <iframe 
        id="tallyPT"
        data-tally-src="https://tally.so/embed/wb5pJ6?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="1000"
        frameborder="0">
      </iframe>

      <!-- EN -->
      <iframe 
        id="tallyEN"
        data-tally-src="https://tally.so/embed/gD0Qq1?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="1000"
        frameborder="0">
      </iframe>

    </div>

  </div>

  <section id="portfolioPage" class="terms-page">
    <div class="portfolio-full">

      <h1 class="font-title portfolio-big-title" data-i18n="portfolio_page_title">
        Works
      </h1>

      <div class="portfolio-filters">
        <button data-filter="all" class="active" data-i18n="filter_all">All</button>
        <button data-filter="illustration" data-i18n="filter_illustration">Illustration</button>
        <button data-filter="vtuber" data-i18n="filter_vtuber">Vtuber</button>
        <button data-filter="emote" data-i18n="filter_emote">Emotes</button>
      </div>

      <div class="portfolio-full-grid">

        <div class="card" data-category="illustration">
          <img src="...">
        </div>

        <div class="card" data-category="vtuber">
          <img src="...">
        </div>

        <div class="card" data-category="emote">
          <img src="...">
        </div>

      </div>

    </div>
  </section>

  <div id="imagePopup" class="image-popup">
    <img id="popupImg">
  </div>

  <section id="pricingPage" class="terms-page">
    <div class="terms-container">

      <h1 class="font-title" data-i18n="pricing">Pricing</h1>

      <div id="pricingSections"></div>

      <button class="cta" onclick="changePage('home')">
        Voltar
      </button>

    </div>
  </section>

  <section id="projectsPage" class="terms-page">
    <div class="terms-container">
      <h1 class="font-title">Projects</h1>
      <p>Projeto 1</p>
      <button class="cta" onclick="changePage('home')">Voltar</button>
    </div>
  </section>

  <section id="policyPage" class="terms-page">
    <div class="terms-container">
      <h1 class="font-title">Policy</h1>
      <p class="font-serif">Carregando...</p>
      <button id="closePolicy" class="cta">Voltar</button>
    </div>
  </section>

  <footer id="footer" class="kitty-footer">
    <div class="footer-container">
      <div class="footer-left">
        <img src="https://raw.githubusercontent.com/Dangokojima/Kittysiteimages/main/images/Logowhite.png" class="footer-logo">
        <p class="font-serif" data-i18n="footer_tagline">Germinando novas espécies...</p>
      </div>

      <div class="footer-links">
        <div class="footer-col">
          <a href="#" data-i18n="about"></a>
          <a href="#" data-i18n="cta" data-open-tally></a>
          <a href="#portfolio" data-i18n="portfolio"></a>
        </div>
        <div class="footer-col">
          <a href="#" data-open="terms" data-i18n="terms"></a>
          <a href="#faq" data-i18n="faq"></a>
          <a href="#" data-page="policy" data-i18n="privacy"></a>
        </div>
      </div>

      <div class="footer-right">
        <p class="footer-contact font-buttons" data-i18n="footer_contact"></p>
        <p class="footer-email">kittyhikari@gmail.com</p>
        <div class="footer-socials">
          <a href="https://vgen.co/Kittyhikari" target="_blank"><img data-social="Vgen"></a>
          <a href="https://www.instagram.com/kitty_hikari/" target="_blank"><img data-social="Insta"></a>
          <a href="https://x.com/KittyHikari_art" target="_blank"><img data-social="X"></a>
          <a href="https://www.tiktok.com/@kittyhikari_art" target="_blank"><img data-social="Tiktok"></a>
          <a href="#" target="_blank"><img data-social="Blue"></a>
        </div>
      </div>
    </div>
  </footer>

  <div id="overlay" class="overlay"></div>

  <div id="sidePanel" class="side-panel">
    <div class="side-menu">
      
      <a href="#" class="font-buttons" data-i18n="about">Sobre</a>

      <a href="#portfolio" class="font-buttons" data-i18n="portfolio">Portfólio</a>

      <a href="#" data-page="projects" class="font-buttons" data-i18n="projects">Projetos</a>

      <a href="#" data-page="pricing" class="font-buttons" data-i18n="pricing">Preços</a>

      <a href="#faq" class="font-buttons" data-i18n="faq">FAQ</a>

      <a href="#footer" class="font-buttons" data-i18n="contact">Contato</a>

      <button id="mobileTally" class="mobile-cta font-serif" data-i18n="cta"></button>

      <div class="socials">
        <a href="https://bsky.app/profile/kittyhikari.bsky.social" target="_blank"><img data-social="Blue"></a>
        <a href="https://www.instagram.com/kitty_hikari/" target="_blank"><img data-social="Insta"></a>
        <a href="https://www.tiktok.com/@kittyhikari_art" target="_blank"><img data-social="Tiktok"></a>
        <a href="https://vgen.co/Kittyhikari" target="_blank"><img data-social="Vgen"></a>
        <a href="https://x.com/KittyHikari_art" target="_blank"><img data-social="X"></a>
      </div>

    </div>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content"><p id="popupText">...</p></div>
  </div>

</body>
</html>
